services:
  live:
    build:
      context: .
      dockerfile: Dockerfile
    image: vol-adaptive-strat:latest
    init: true
    environment:
      APCA_API_KEY_ID: ${APCA_API_KEY_ID:-}
      APCA_API_SECRET_KEY: ${APCA_API_SECRET_KEY:-}
      CLI_HOST: ${CLI_HOST:-0.0.0.0}
      CLI_PORT: ${CLI_PORT:-9000}
      CLI_TIMEOUT_SECONDS: ${CLI_TIMEOUT_SECONDS:-30}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_DIR: ${LOG_DIR:-/app/logs}
      LOG_CONSOLE: ${LOG_CONSOLE:-true}
      TZ: ${TZ:-America/New_York}
      HMM_MODEL_PATH: ${HMM_MODEL_PATH:-/app/models/regime_hmm.pkl}
    command: ["python", "live.py"]
    volumes:
      - hmm-models:/app/models
      - app-logs:/app/logs
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os,socket; s=socket.socket(); s.settimeout(3); s.connect(('127.0.0.1', int(os.getenv('CLI_PORT','9000')))); s.close()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    stop_grace_period: 30s
    restart: unless-stopped

  backtest:
    build:
      context: .
      dockerfile: Dockerfile
    image: vol-adaptive-strat:latest
    init: true
    environment:
      APCA_API_KEY_ID: ${APCA_API_KEY_ID:-}
      APCA_API_SECRET_KEY: ${APCA_API_SECRET_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_DIR: ${LOG_DIR:-/app/logs}
      LOG_CONSOLE: ${LOG_CONSOLE:-true}
      TZ: ${TZ:-America/New_York}
      HMM_MODEL_PATH: ${HMM_MODEL_PATH:-/app/models/regime_hmm.pkl}
    command: ["python", "backtest.py", "--config", "config.yaml"]
    volumes:
      - hmm-models:/app/models
      - app-logs:/app/logs
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    profiles:
      - backtest

volumes:
  hmm-models:
  app-logs:
